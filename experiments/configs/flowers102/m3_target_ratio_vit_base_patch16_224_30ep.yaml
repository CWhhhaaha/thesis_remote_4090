experiment:
  name: flowers102_m3_target_ratio_vit_base_patch16_224_30ep
  init: standard
  seed: 43
  run_dir: outputs/runs/flowers102_m3_target_ratio_vit_base_patch16_224_30ep_seed43_cuda4090

data:
  dataset: flowers102
  root: data/flowers102
  num_workers: 8

model:
  img_size: 224
  patch_size: 16
  num_classes: 102
  embed_dim: 768
  depth: 12
  num_heads: 12
  mlp_ratio: 4.0
  qkv_bias: true
  drop_rate: 0.0
  attn_drop_rate: 0.0

train:
  epochs: 30
  batch_size: 64
  lr: 0.003
  beta1: 0.9
  beta2: 0.999
  weight_decay: 0.05
  warmup_epochs: 5
  warmup_start_factor: 0.1
  mixup_alpha: 0.2
  cutmix_alpha: 0.0
  label_smoothing: 0.1
  ema_decay: 0.9999
  use_ema: true
  eval_every: 1
  amp: true
  channels_last: true

method3:
  regularizer_type: target_ratio
  epsilon: 1.0e-12
  rho_targets: [0.1, 0.2, 0.25, 0.25, 0.3, 0.3, 0.35, 0.35, 0.4, 0.4, 0.5, 0.5]
  lambdas: [1.0e-1, 1.0e-1, 1.0e-1, 1.0e-1, 1.0e-1, 1.0e-1, 1.0e-1, 1.0e-1, 1.0e-1, 1.0e-1, 1.0e-1, 1.0e-1]
