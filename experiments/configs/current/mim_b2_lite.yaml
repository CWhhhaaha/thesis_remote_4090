experiment:
  name: MIM_B2_lite
  init: layerwise_prior
  seed: 43
  run_dir: outputs/runs/MIM_B2_lite_seed43_cuda4090
  base_std: 0.02
  lambdas: [0.5, 0.75, 1.0, 1.2]

data:
  root: data/cifar10
  num_workers: 8

model:
  img_size: 32
  patch_size: 4
  embed_dim: 256
  depth: 4
  num_heads: 4
  mlp_ratio: 4.0
  qkv_bias: true
  drop_rate: 0.0
  attn_drop_rate: 0.0

train:
  epochs: 200
  batch_size: 512
  lr: 0.0015
  beta1: 0.9
  beta2: 0.999
  weight_decay: 0.05
  warmup_epochs: 20
  warmup_start_factor: 0.05
  min_visible_patches: 4
  eval_every: 10
  amp: true
  channels_last: true
