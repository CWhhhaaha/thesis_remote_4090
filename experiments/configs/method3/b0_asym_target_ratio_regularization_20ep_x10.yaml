experiment:
  name: M3_B0_asym_target_ratio_regularization_20ep_x10
  init: standard
  seed: 43
  run_dir: outputs/runs/M3_B0_asym_target_ratio_regularization_20ep_x10_seed43_cuda4090

data:
  root: data/cifar10
  num_workers: 8

model:
  img_size: 32
  patch_size: 4
  num_classes: 10
  embed_dim: 512
  depth: 6
  num_heads: 8
  mlp_ratio: 4.0
  qkv_bias: true
  drop_rate: 0.0
  attn_drop_rate: 0.0

train:
  epochs: 20
  batch_size: 256
  lr: 0.003
  beta1: 0.9
  beta2: 0.999
  weight_decay: 0.05
  warmup_epochs: 5
  warmup_start_factor: 0.033
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  label_smoothing: 0.01
  ema_decay: 0.99998
  use_ema: true
  eval_every: 1
  amp: true
  channels_last: true

method3:
  regularizer_type: target_ratio
  epsilon: 1.0e-12
  rho_targets: [0.109, 0.239, 0.372, 0.490, 0.586, 0.662]
  lambdas: [5.0e-1, 3.5e-1, 2.5e-1, 1.5e-1, 5.0e-2, 0.0]
